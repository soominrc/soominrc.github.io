<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Something's missing</title>
    <style>
        body {
            background-color: #f4f1ea; 
            color: #2d2d2d;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .content {
            max-width: 400px;
            padding: 40px;
        }

        .status {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a69f92;
            margin-bottom: 2rem;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin: 0 0 1.5rem 0;
            color: #5d6d7e; 
        }

        p {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 3rem;
            color: #7a746a;
        }

        .home-link {
            display: inline-block;
            color: #2d2d2d;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1.5px solid #d4cdc3;
            padding-bottom: 5px;
            transition: border-color 0.3s ease;
        }

        .home-link:hover {
            border-color: #5d6d7e;
        }

        
        .illustration {
            margin-bottom: 2rem;
            font-size: 2rem;
            display: block;
        }
    </style>
</head>
<body>

    <div class="content">
        <span class="status">Error 404</span>
        <span class="illustration">☁️</span>
        <h1>We've misplaced this page.</h1>
        <p>
            It was here a moment ago, but it seems to have vanished into thin air. 
           
        </p>
        
        <a href="/" class="home-link">Return to home</a>
    </div>

</body>
</html>
